<ion-header>
  <ion-toolbar color="primary">
    <ion-title><span class="app-title">Menu</span></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-searchbar
    (ionInput)="onSearchInput($event)"
    placeholder="Search meals…"
    [debounce]="0"
  ></ion-searchbar>

  <div class="meal-list" *ngIf="groupedMeals.length > 0">
    <ng-container *ngFor="let group of groupedMeals; let last = last">

      <div
        class="meal-row"
        *ngFor="let meal of group.meals"
        (click)="openEditor(meal)"
      >
        <span class="meal-name">{{ meal.name }}</span>
        <app-tag-pill
          *ngIf="group.tagId"
          [name]="group.tagName"
          [color]="group.tagColor"
          size="sm"
        ></app-tag-pill>
        <span class="ingredient-count" *ngIf="meal.ingredients.length > 0">
          {{ meal.ingredients.length }}
        </span>
      </div>

      <div class="group-divider" *ngIf="!last"></div>

    </ng-container>
  </div>

  <div class="empty-state" *ngIf="groupedMeals.length === 0 && !searchQuery">
    <p>No meals yet. Tap + to create one.</p>
  </div>

  <div class="empty-state" *ngIf="groupedMeals.length === 0 && searchQuery">
    <p>No meals match your search.</p>
  </div>

  <ion-fab vertical="bottom" horizontal="center" slot="fixed" style="bottom: 48px"
    *ngIf="!panelVisible && !ingredientsPopupVisible">
    <ion-fab-button (click)="openCreator()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Creator / Editor panel -->
  <div class="backdrop" *ngIf="panelVisible" (click)="closePanel()">
    <div class="bottom-panel" (click)="$event.stopPropagation()">

      <p class="panel-title">{{ editingMealId ? 'Edit meal' : 'New meal' }}</p>

      <input
        class="text-input"
        [(ngModel)]="editingName"
        placeholder="Meal name…"
        type="text"
        maxlength="60"
      />

      <p class="panel-section-label">Tag</p>
      <div class="tag-selector">
        <button
          class="tag-sel-pill tag-sel-pill--none"
          [class.tag-sel-pill--selected]="editingTagId === null"
          (click)="editingTagId = null"
        >None</button>
        <button
          class="tag-sel-pill"
          *ngFor="let tag of tags"
          [class.tag-sel-pill--selected]="editingTagId === tag.id"
          [style.background-color]="editingTagId === tag.id ? tag.color : ''"
          (click)="editingTagId = tag.id"
        >{{ tag.name }}</button>
      </div>

      <p class="panel-section-label">Ingredients</p>
      <button class="ingredients-btn" (click)="openIngredientsPopup()">
        <ion-icon name="list-outline"></ion-icon>
        <span>{{ editingIngredients.length
          ? editingIngredients.length + ' ingredient' + (editingIngredients.length !== 1 ? 's' : '')
          : 'Add ingredients' }}</span>
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </button>

      <div class="panel-actions">
        <ion-button expand="block" (click)="savePanel()">
          <ion-icon slot="start" name="checkmark-outline"></ion-icon>
          Save
        </ion-button>
        <ion-button
          *ngIf="editingMealId"
          expand="block"
          class="btn-delete"
          (click)="deleteMeal()"
        >
          <ion-icon slot="start" name="trash-outline"></ion-icon>
          Delete
        </ion-button>
      </div>

    </div>
  </div>

  <!-- Ingredients popup -->
  <div class="ing-backdrop" *ngIf="ingredientsPopupVisible" (click)="closeIngredientsPopup()">
    <div class="ing-popup" (click)="$event.stopPropagation()">

      <button class="ing-close" (click)="closeIngredientsPopup()">
        <ion-icon name="close-outline"></ion-icon>
      </button>

      <p class="panel-title">Ingredients</p>

      <app-item-editor
        [items]="editingIngredients"
        [showTags]="false"
        [allowReorder]="false"
        placeholder="Ingredient name…"
        (itemAdd)="onIngredientAdd($event)"
        (itemRemove)="removeIngredient($event)"
      ></app-item-editor>

    </div>
  </div>

</ion-content>
