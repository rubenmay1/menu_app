<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Menu…</title>
  <script>
    const match = window.location.search.replace(/^\?/, '').split('&').find(p => p.startsWith('data='));
    if (match) {
      window.location.replace('menu-app://import?' + match);
    }
  </script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 24px;color:#888">
  <p style="font-size:1.1rem;color:#333">Opening Menu app…</p>
  <p style="font-size:0.85rem">If nothing happens, make sure the Menu app is installed.</p>
</body>
</html>
